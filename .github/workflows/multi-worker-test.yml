name: Multi-Worker Test (SKU matrix)

# End-to-end addprocs multi-worker test against real Azure SKUs covering
# different CPU topologies. Manual dispatch only - each run provisions HPC
# VMs and spends real money, so it is never triggered by push/PR.
#
# Flow:
#   setup   - one-time per run: RG, build VNet/NSG, gallery, Packer image.
#   test    - matrix over SKUs. Each shard creates its own per-region
#             VNet/NSG and small coordinator VM in the shared RG, sshes in,
#             runs demo/multi_worker_test.jl with the matrix SKU + expected
#             topology, tears down its scale set + coordinator VM.
#   cleanup - if: always(), deletes the RG (catches anything the per-shard
#             teardown missed).

on:
  workflow_dispatch:

# Home region for setup: where the RG, gallery, image build VNet, and the
# Packer build itself live. The image is replicated to every region listed
# in test/image.pkr.hcl's `replication_regions`. Each test shard then
# provisions its own VNet/NSG in its target region (see matrix.location).
env:
  HOME_LOCATION: "eastus"

jobs:
  setup:
    name: Setup shared infra + Packer image
    runs-on: ubuntu-latest
    outputs:
      resource_group: ${{ env.RESOURCE_GROUP }}
      gallery_name:   ${{ env.GALLERY_NAME }}
      image_name:     ${{ env.IMAGE_NAME }}
    env:
      TENANT_ID:       "${{ secrets.TENANT_ID }}"
      SUBSCRIPTION_ID: "${{ secrets.SUBSCRIPTION_ID }}"
      CLIENT_ID:       "${{ secrets.CLIENT_ID }}"
      CLIENT_SECRET:   "${{ secrets.CLIENT_SECRET }}"
      RESOURCE_GROUP:  "azman-mwt-${{ github.run_id }}"
      GALLERY_NAME:    "azmanmwt${{ github.run_id }}gallery"
      IMAGE_NAME:      "azman-mwt-${{ github.run_id }}-image"
      # Build-only VNet/NSG: used by Packer to bake the image. Shards never
      # touch these; each shard provisions its own per-region networking.
      VNET_NAME:       "azman-mwt-${{ github.run_id }}-build-vnet"
      SUBNET_NAME:     "default"
      NSG_NAME:        "azman-mwt-${{ github.run_id }}-build-nsg"
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Ensure base image exists
        # First-run bootstrap for the long-lived base SIG image (see
        # scripts/ensure_base_image.sh). Idempotent: a no-op on every
        # subsequent dispatch.
        run: |
          az login --service-principal -u "$CLIENT_ID" -p "$CLIENT_SECRET" -t "$TENANT_ID"
          bash "${GITHUB_WORKSPACE}/scripts/ensure_base_image.sh"

      - name: Provision RG, build VNet/NSG, gallery
        run: |
          az login --service-principal -u "$CLIENT_ID" -p "$CLIENT_SECRET" -t "$TENANT_ID"
          az group create                -g "$RESOURCE_GROUP" -l "$HOME_LOCATION" \
              --tags "CostElement=YWED10528906" "CompanyCode=0322" "environment=dev" "OwnerEmail=sam.kaplan@chevron.com"
          az group wait                  -g "$RESOURCE_GROUP" --created
          az sig create                  -g "$RESOURCE_GROUP" -r "$GALLERY_NAME" -l "$HOME_LOCATION"
          az sig image-definition create -g "$RESOURCE_GROUP" -r "$GALLERY_NAME" -i "$IMAGE_NAME" \
              -p "canonical" -f "0001-com-ubuntu-server-jammy" -s "22_04-lts-gen2" \
              --os-type linux --hyper-v-generation V2 -l "$HOME_LOCATION"
          az network nsg create          -g "$RESOURCE_GROUP" -n "$NSG_NAME" -l "$HOME_LOCATION"
          az network nsg rule create     -g "$RESOURCE_GROUP" -n "rule-$NSG_NAME" \
              --nsg-name "$NSG_NAME" --priority 101 \
              --source-address-prefixes "AzureCloud" --destination-port-ranges 22
          az network vnet create         -g "$RESOURCE_GROUP" -n "$VNET_NAME" \
              -l "$HOME_LOCATION" --subnet-name "$SUBNET_NAME"
          az network vnet subnet update  -g "$RESOURCE_GROUP" -n "$SUBNET_NAME" \
              --vnet-name "$VNET_NAME" --network-security-group "$NSG_NAME"

      - name: Install Packer
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo apt-key add -
          sudo apt-add-repository "deb [arch=amd64] https://apt.releases.hashicorp.com $(lsb_release -cs) main"
          sudo apt-get update && sudo apt-get install packer

      - name: Build Packer image
        # Per-run image derives from the long-lived base image (refresh
        # via refresh-base-image.yml). The base bakes Julia + apt deps +
        # AzManagers' Julia deps precompiled, so this step only swaps
        # AzManagers to the dispatched SHA and writes templates.jl.
        run: |
          packer init ${GITHUB_WORKSPACE}/test/image.pkr.hcl
          packer build -color=false -timestamp-ui \
            -var "subscription_id=${SUBSCRIPTION_ID}" \
            -var "tenant_id=${TENANT_ID}" \
            -var "client_id=${CLIENT_ID}" \
            -var "client_secret=${CLIENT_SECRET}" \
            -var "resource_group=${RESOURCE_GROUP}" \
            -var "image_name=${IMAGE_NAME}" \
            -var "virtual_network=${VNET_NAME}" \
            -var "virtual_subnet=${SUBNET_NAME}" \
            -var "gallery=${GALLERY_NAME}" \
            -var "azmanagers_version=${{ github.sha }}" \
            -var "azmanagers_repo=https://github.com/${{ github.repository }}.git" \
            ${GITHUB_WORKSPACE}/test/image.pkr.hcl

  test:
    name: SKU ${{ matrix.sku }} (${{ matrix.location }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Shards run sequentially so peak spot vCPU consumption is the size of
      # the largest shard, not the sum. Bumping to >1 multiplies the spot
      # quota you need by the parallelism. Keep at 1 unless you have
      # plenty of regional spot headroom.
      max-parallel: 1
      matrix:
        include:
          # 120 cores, AMD EPYC 7V73X Milan-X HPC. 2 sockets x 60c,
          # 4 NUMA per socket (8 total). With ppi=2 the planner assigns
          # one worker per socket; each worker's CPU set spans 4 NUMA
          # nodes so no single NUMA contains it -> numa_node=nothing on
          # both workers, distinct count = 1.
          - sku:          "Standard_HB120rs_v3"
            slug:         "hb120v3"
            location:     "eastus"
            expected_numa: 1
            expected_sock: 2
          # 64 cores, Intel Broadwell. 2 sockets, 1 NUMA per socket.
          # With ppi=2 each worker maps to one socket = one NUMA.
          - sku:          "Standard_E64s_v3"
            slug:         "e64sv3"
            location:     "eastus"
            expected_numa: 2
            expected_sock: 2
          # 44 cores, Intel Xeon Platinum 8168 Skylake-SP HPC.
          # 2 sockets x 22c, 1 NUMA per socket. With ppi=2 each worker
          # maps to one socket = one NUMA.
          - sku:          "Standard_HC44rs"
            slug:         "hc44rs"
            location:     "eastus"
            expected_numa: 2
            expected_sock: 2
          # ---------- larger SKUs disabled to fit a 174-vCPU spot budget ----------
          # Re-enable by un-commenting + adding the per-family spot quota.
          # Both v4 and v5 are 2 sockets x 88c with 4 NUMA per socket,
          # same ppi=2 placement pattern as HBv3 -> numa=1, sock=2.
          #
          # - sku:          "Standard_HB176rs_v4"    # 176c AMD Genoa-X
          #   slug:         "hb176v4"
          #   location:     "eastus"
          #   expected_numa: 1
          #   expected_sock: 2
          # - sku:          "Standard_HB176rs_v5"    # 176c AMD Turin-HBM
          #   slug:         "hb176v5"
          #   location:     "southcentralus"        # also re-add to replication_regions
          #   expected_numa: 1
          #   expected_sock: 2
    env:
      TENANT_ID:       "${{ secrets.TENANT_ID }}"
      SUBSCRIPTION_ID: "${{ secrets.SUBSCRIPTION_ID }}"
      CLIENT_ID:       "${{ secrets.CLIENT_ID }}"
      CLIENT_SECRET:   "${{ secrets.CLIENT_SECRET }}"
      RESOURCE_GROUP:  "${{ needs.setup.outputs.resource_group }}"
      GALLERY_NAME:    "${{ needs.setup.outputs.gallery_name }}"
      IMAGE_NAME:      "${{ needs.setup.outputs.image_name }}"
      LOCATION:        "${{ matrix.location }}"
      # Per-shard networking: VNet/NSG live in the shard's region, named so
      # multiple shards in different regions don't collide inside one RG.
      VNET_NAME:       "azman-mwt-${{ github.run_id }}-${{ matrix.slug }}-vnet"
      SUBNET_NAME:     "default"
      NSG_NAME:        "azman-mwt-${{ github.run_id }}-${{ matrix.slug }}-nsg"
      COORD_VM:        "coord-${{ matrix.slug }}-${{ github.run_id }}"
      COORD_PIP:       "coord-${{ matrix.slug }}-${{ github.run_id }}-pip"
    steps:
      - uses: actions/checkout@v4

      - name: Create SSH key pair
        run: ssh-keygen -f /home/runner/.ssh/azmanagers_rsa -N ''

      - name: Provision per-region VNet/NSG in ${{ matrix.location }}
        run: |
          az login --service-principal -u "$CLIENT_ID" -p "$CLIENT_SECRET" -t "$TENANT_ID"
          az network nsg create     -g "$RESOURCE_GROUP" -n "$NSG_NAME" -l "$LOCATION"
          az network nsg rule create -g "$RESOURCE_GROUP" -n "rule-$NSG_NAME" \
              --nsg-name "$NSG_NAME" --priority 101 \
              --source-address-prefixes "AzureCloud" --destination-port-ranges 22
          az network vnet create    -g "$RESOURCE_GROUP" -n "$VNET_NAME" \
              -l "$LOCATION" --subnet-name "$SUBNET_NAME"
          az network vnet subnet update -g "$RESOURCE_GROUP" -n "$SUBNET_NAME" \
              --vnet-name "$VNET_NAME" --network-security-group "$NSG_NAME"

      - name: Create coordinator VM
        run: |
          # Coordinator is launched as a spot VM (eviction-policy=Delete so
          # there is nothing to clean up if Azure reclaims it). If the
          # coordinator gets evicted mid-test the shard fails, which is
          # acceptable for a CI flow - the workflow's cleanup job tears the
          # whole RG down regardless.
          # --size is explicit because the az CLI default (Standard_DS1_v2)
          # is frequently capacity-constrained in eastus; DSv3 has plenty of
          # both quota and capacity in this region.
          az vm create \
              -g "$RESOURCE_GROUP" -n "$COORD_VM" -l "$LOCATION" \
              --image "$IMAGE_NAME" \
              --size Standard_D2s_v3 \
              --public-ip-sku Standard \
              --public-ip-address "$COORD_PIP" \
              --subnet "$SUBNET_NAME" --vnet-name "$VNET_NAME" --nsg "$NSG_NAME" \
              --ssh-key-values @/home/runner/.ssh/azmanagers_rsa.pub \
              --admin-username cvx \
              --priority Spot --max-price -1 --eviction-policy Delete

      - name: Run test (basic + placement) for ${{ matrix.sku }}
        env:
          SKU:           "${{ matrix.sku }}"
          EXPECTED_NUMA: "${{ matrix.expected_numa }}"
          EXPECTED_SOCK: "${{ matrix.expected_sock }}"
        run: |
          ipaddress=$(az network public-ip show -g "$RESOURCE_GROUP" -n "$COORD_PIP" \
              | jq -r '.ipAddress')

          # Seed the test config from the annotated template; the
          # SECTION_FIELD env-var overrides fill in the REPLACE-ME values.
          scp -o StrictHostKeyChecking=no -i /home/runner/.ssh/azmanagers_rsa \
              demo/multi_worker_test.toml demo/multi_worker_test.jl \
              cvx@$ipaddress:/home/cvx/

          # Unquoted heredoc: $VARS expand on the runner; the resulting
          # literal text is what executes on the coordinator.
          ssh -o StrictHostKeyChecking=no -i /home/runner/.ssh/azmanagers_rsa \
              cvx@$ipaddress bash -s <<EOF 2>&1 | tee mwt-${{ matrix.slug }}.log
          set -euo pipefail
          mkdir -p ~/.azmanagers
          mv ~/multi_worker_test.toml ~/.azmanagers/multi_worker_test.toml
          chmod 600 ~/.azmanagers/multi_worker_test.toml

          export AZURE_SUBSCRIPTION_ID="$SUBSCRIPTION_ID"
          export AZURE_RESOURCE_GROUP="$RESOURCE_GROUP"
          export AZURE_TENANT_ID="$TENANT_ID"
          export AZURE_CLIENT_ID="$CLIENT_ID"
          export AZURE_CLIENT_SECRET="$CLIENT_SECRET"
          export AZURE_VNET="$VNET_NAME"
          export AZURE_SUBNET="$SUBNET_NAME"
          export AZURE_GALLERY="$GALLERY_NAME"
          export AZURE_IMAGE_NAME="$IMAGE_NAME"
          export AZURE_LOCATION="$LOCATION"
          export AZURE_SKU_NAME="$SKU"
          export AZURE_SSH_USER="cvx"
          export AZURE_SPOT="true"

          export SCENARIOS_BASIC="true"
          export SCENARIOS_PLACEMENT="true"
          export SCENARIOS_MPI_NESTED="false"
          export SCENARIOS_PPI="2"
          export SCENARIOS_EXPECTED_NUMA_NODES="$EXPECTED_NUMA"
          export SCENARIOS_EXPECTED_SOCKETS="$EXPECTED_SOCK"
          export SCENARIOS_KEEP="false"

          julia ~/multi_worker_test.jl ~/.azmanagers/multi_worker_test.toml
          EOF

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mwt-${{ matrix.slug }}
          path: mwt-${{ matrix.slug }}.log

      - name: Delete coordinator VM
        if: always()
        run: |
          az vm delete -g "$RESOURCE_GROUP" -n "$COORD_VM" --yes || true
          az network public-ip delete -g "$RESOURCE_GROUP" -n "$COORD_PIP" || true

  cleanup:
    name: Cleanup RG
    needs: [setup, test]
    # Run whenever setup actually started (success or failure leaves resources
    # behind). Skip only if setup was itself skipped/cancelled.
    if: always() && needs.setup.result != 'skipped' && needs.setup.result != 'cancelled'
    runs-on: ubuntu-latest
    env:
      TENANT_ID:       "${{ secrets.TENANT_ID }}"
      CLIENT_ID:       "${{ secrets.CLIENT_ID }}"
      CLIENT_SECRET:   "${{ secrets.CLIENT_SECRET }}"
      # Compute the RG name directly rather than depending on a setup output,
      # so cleanup works even when setup failed before emitting outputs.
      RESOURCE_GROUP:  "azman-mwt-${{ github.run_id }}"
    steps:
      - name: Delete RG if it exists
        run: |
          az login --service-principal -u "$CLIENT_ID" -p "$CLIENT_SECRET" -t "$TENANT_ID"
          if [ "$(az group exists -n "$RESOURCE_GROUP")" = "true" ]; then
              az group delete -n "$RESOURCE_GROUP" --yes --no-wait
          else
              echo "RG $RESOURCE_GROUP does not exist; nothing to clean."
          fi
